    zodExport: ErrorDisplayPropsSchema
    i18nKeys: []
    sizeLimit: "5KB"
    a11yLevel: WCAG-AA
  - name: SubmitButton
    category: forms
    schema: src/components/forms/SubmitButton.schema.ts
    zodExport: SubmitButtonPropsSchema
    i18nKeys: []
    sizeLimit: "10KB"
    a11yLevel: WCAG-AA
    runtimes: ["react", "preact"]
    convergence: ["chi", "hermes"]
  - name: Skeleton
    category: display
    schema: src/components/display/Skeleton.schema.ts
    zodExport: SkeletonPropsSchema
    i18nKeys: ["Skeleton.aria.label", "Skeleton.error.invalidProps"]
    sizeLimit: "80KB"
    a11yLevel: WCAG-AA
    runtimes: ["react", "preact"]
    convergence: ["hermes", "chi"]
  - name: Alert
    category: confirmation
    schema: src/components/confirmation/Alert.schema.ts
    zodExport: AlertPropsSchema
    i18nKeys: ["Alert.aria.dismiss", "Alert.error.invalidProps"]
    sizeLimit: "30KB"
    a11yLevel: WCAG-AA
    runtimes: ["react", "preact"]
    convergence: ["hermes", "demeter"]
    wcag:
      - variant=error → role=alert + aria-live=assertive
      - all others → role=status + aria-live=polite
      - aria-atomic=true on container
      - dismiss button aria-label localized (EN + FR)
      - dismiss button focus-visible ring
      - PERSISTENT inline (no auto-dismiss)
  - name: Tabs
    category: input
    schema: src/components/input/Tabs.schema.ts
    zodExport: TabsPropsSchema
    i18nKeys: ["Tabs.error.invalidProps"]
    sizeLimit: "30KB"
    a11yLevel: WCAG-AA
    runtimes: ["react", "preact"]
    convergence: ["hermes"]
    wcag:
      - role=tablist on container
      - role=tab + aria-selected + aria-controls on each tab button
      - role=tabpanel + aria-labelledby on each panel
      - roving tabindex (active tab = 0, others = -1)
      - ArrowLeft/Right (horizontal) or ArrowUp/Down (vertical)
      - Home/End keyboard navigation
      - disabled tabs skipped in keyboard nav
  - name: VirtualList
    category: display
    schema: src/components/display/VirtualList.schema.ts
    zodExport: VirtualListPropsSchema
    i18nKeys: ["VirtualList.empty.message", "VirtualList.error.invalidProps"]
    sizeLimit: "80KB"
    a11yLevel: WCAG-AA
    crossRuntime: true
    runtimes: ["react", "preact"]
    convergence: ["Hermes", "Mu", "future-BUs"]
  - name: ConfirmModal
    category: confirmation
    alias: true
    aliasOf: ConfirmDialog
    schema: src/components/input/ConfirmDialog.schema.ts
    zodExport: ConfirmDialogPropsSchema
    i18nKeys: ["ConfirmDialog.button.confirm", "ConfirmDialog.button.cancel", "ConfirmDialog.aria.dialog"]
    sizeLimit: "30KB"
    a11yLevel: WCAG-AA
    note: "v0.3.0-alpha.0 T9 — thin re-export of ConfirmDialog under the ConfirmModal name for Chi gptpowerups-extension naming bridge. Referential identity invariant. Exposed on @vantageos/mosaic/{react,preact}/confirmation."
  - name: Input
    category: forms
    schema: src/components/forms/Input.schema.ts
    zodExport: InputPropsSchema
  - name: FieldArray
    category: forms
    schema: src/components/forms/FieldArray.schema.ts
    zodExport: FieldArrayPropsSchema
    i18nKeys: []
    sizeLimit: "15KB"
