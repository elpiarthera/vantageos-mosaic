name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Type · Test · A11y · Size · Drift · Stories
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["22.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Step 1: tsc --noEmit (zero type errors)
      - name: tsc
        run: pnpm -r exec tsc --noEmit

      # Step 2: biome check --error-on-warnings
      - name: biome
        run: pnpm exec biome check --error-on-warnings .

      # Step 3: vitest run --coverage (thresholds enforced)
      - name: vitest
        run: pnpm --filter @vantageos/mosaic run test -- --coverage

      # Step 4: playwright + axe-core (a11y violations = fail)
      # The a11y specs drive a headless Chromium against a Storybook served by
      # Playwright's own webServer (packages/mosaic/playwright.config.ts runs
      # `storybook dev -p 6006`). The CI runner ships no browsers, so install
      # Chromium + its system deps before the test step or every spec fails at
      # browserType.launch with "Executable doesn't exist".
      - name: playwright-install-chromium
        run: pnpm --filter @vantageos/mosaic exec playwright install --with-deps chromium
      - name: playwright-axe
        run: pnpm --filter @vantageos/mosaic exec playwright test tests/a11y/

      # Step 5: build (produces dist/ — required by size-limit below)
      # size-limit reads dist/index.js, dist/react/forms.js, dist/preact/forms.js.
      # Nothing earlier in this job runs the build, so without this step
      # size-limit fails with "Size Limit can't find files at dist/index.js".
      - name: build
        run: pnpm --filter @vantageos/mosaic run build

      # Step 6: size-limit (≤250KB gz)
      - name: size-limit
        run: pnpm --filter @vantageos/mosaic run size-limit

      # Step 7: registry drift gate
      - name: registry-drift
        run: node packages/mosaic/scripts/mosaic-registry-drift-check.mjs

      # Step 8: storybook test-runner (a11y + play-fn smoke per story)
      # The @storybook/test-runner binary is `test-storybook` (not
      # `storybook-test-runner`), and it drives a headless Chromium (installed
      # by the playwright-install-chromium step above) against a RUNNING
      # Storybook at http://127.0.0.1:6006. The runner does not serve Storybook
      # itself, so we build the static Storybook, serve it in the background,
      # wait for it to answer, then run the suite against it.
      - name: build-storybook
        run: pnpm --filter @vantageos/mosaic run build-storybook
      - name: storybook-test
        run: |
          npx --yes http-server@14 packages/mosaic/storybook-static -p 6006 --silent &
          SB_PID=$!
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://127.0.0.1:6006/index.html; then
              echo "storybook up after ${i}s"
              break
            fi
            sleep 1
          done
          pnpm --filter @vantageos/mosaic exec test-storybook --url http://127.0.0.1:6006
          STATUS=$?
          kill "$SB_PID" 2>/dev/null || true
          exit $STATUS

  build-parity-cross-runtime:
    name: Gate 1 — Cross-runtime build parity
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vantageos/mosaic-tokens build
      - run: pnpm --filter @vantageos/mosaic build
      - name: Gate 1 — verify-build-parity
        run: bash scripts/verify-build-parity.sh

  peer-resolution-smoke:
    name: Gate 2 — PeerDeps optionality smoke
    needs: build-parity-cross-runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vantageos/mosaic-tokens build
      - run: pnpm --filter @vantageos/mosaic build
      - name: Gate 2 — peer-resolution smoke
        run: bash e2e/peer-resolution/run-smoke.sh

  coherence-test-mosaic-tokens:
    name: Gate 3 — Coherence dedicated (ship-blocker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Gate 3 — coherence dedicated (ship-blocker, no override)
        run: pnpm --filter @vantageos/mosaic-tokens test --reporter=verbose --bail=1

  npm-publish:
    name: Publish to npm (Eta gate)
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vantageos/mosaic run build
      - name: Eta gate check
        env:
          ETA_APPROVED_TASK_ID: ${{ secrets.ETA_APPROVED_TASK_ID }}
        run: node packages/mosaic/scripts/check-eta-gate.js
      - name: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          ETA_APPROVED_TASK_ID: ${{ secrets.ETA_APPROVED_TASK_ID }}
        run: pnpm --filter @vantageos/mosaic publish --no-git-checks --access public
